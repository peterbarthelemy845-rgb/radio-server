<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#102a78,#071642);font-family:Arial,Helvetica,sans-serif;color:#0f172a;padding:18px}.card{width:100%;max-width:430px;background:#fff;border-radius:24px;padding:26px;box-shadow:0 18px 45px rgba(0,0,0,.25)}h1{margin:0 0 8px;font-size:30px}.sub{color:#64748b;margin-bottom:22px;line-height:1.4}label{display:block;font-weight:900;margin-bottom:8px}input{width:100%;height:58px;border:1px solid #dbe4f0;border-radius:16px;padding:0 16px;font-size:20px}button{width:100%;border:0;border-radius:16px;margin-top:18px;padding:16px;background:#2563eb;color:#fff;font-size:20px;font-weight:900}.error{background:#fee2e2;color:#991b1b;border-radius:12px;padding:12px;margin-bottom:14px;font-weight:800}.hint{font-size:13px;color:#64748b;margin-top:16px;line-height:1.4}
</style>
</head>
<body>
  <form class="card" method="post">
    <h1>Admin Locked</h1>
    <div class="sub">Enter your admin password to approve or reject submitted stations.</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" autofocus>
    <button type="submit">Unlock Admin</button>
    <div class="hint">Default password is 1234. Change it later with the ADMIN_PASSWORD environment variable on Render.</div>
  </form>
</body>
</html>
