<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Add Station</title><style>:root{--bg:#071642;--card:#fff;--text:#0f172a;--muted:#64748b;--blue:#2563eb}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#13348c,#071642);min-height:100vh;color:var(--text);padding:22px}.wrap{max-width:620px;margin:0 auto}.brand{text-align:center;color:#fff;margin:20px 0}.brand h1{font-size:42px;margin:10px 0 6px}.sub{opacity:.82;font-size:18px}.card{background:var(--card);border-radius:26px;padding:24px;box-shadow:0 24px 60px rgba(0,0,0,.3)}.pill{display:inline-flex;gap:8px;background:#eff6ff;color:#1d4ed8;padding:9px 13px;border-radius:999px;font-weight:900;margin-bottom:18px}.pill:before{content:"•";color:#22c55e;font-size:22px;line-height:0}label{display:block;font-weight:900;margin:14px 0 8px}input{width:100%;min-height:56px;border:2px solid #dbe4f0;border-radius:17px;padding:14px 16px;font-size:17px}.hint{font-size:13px;color:var(--muted);margin-top:6px}.btn{width:100%;margin-top:20px;min-height:60px;border:0;border-radius:18px;background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff;font-size:20px;font-weight:900}.msg{margin-top:16px;padding:14px;border-radius:14px;font-weight:900}.ok{background:#dcfce7;color:#166534}.err{background:#fee2e2;color:#991b1b}.footer{text-align:center;color:rgba(255,255,255,.65);font-size:13px;margin:16px 0}</style></head><body><main class="wrap"><section class="brand"><div style="font-size:48px">📻</div><h1>Add Station</h1><div class="sub">Submit a stream to the public server for approval.</div></section><section class="card"><div class="pill">Public Server</div><form method="post" action="/api/add-station"><label>Station name</label><input name="name" required value="{{ form.name if form else '' }}" placeholder="Example: Test Radio"><label>Stream URL</label><input name="url" type="url" required value="{{ form.url if form else '' }}" placeholder="https://example.com/stream.mp3"><div class="hint">MP3 stream links work best.</div><label>Website / subtitle optional</label><input name="subtitle" value="{{ form.subtitle if form else 'Custom Station' }}" placeholder="radiostation.com"><button class="btn">Save Station</button></form>{% if message %}<div class="msg {% if status == 'error' %}err{% else %}ok{% endif %}">{{ message }}</div>{% endif %}</section><div class="footer">La Voix Divine Radio Setup</div></main></body></html>
