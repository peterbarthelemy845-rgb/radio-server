<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><meta http-equiv="refresh" content="30"><title>Manage Stations</title><style>:root{--bg:#071642;--card:#fff;--text:#0f172a;--muted:#64748b;--blue:#2563eb;--red:#dc2626;--line:#dbe4f0}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#102a78,#071642);color:var(--text);min-height:100vh;padding:22px}.wrap{max-width:900px;margin:0 auto}.top{color:#fff;margin-bottom:18px}h1{margin:0;font-size:34px}.sub{opacity:.8;margin-top:6px}.card{background:#fff;border-radius:22px;padding:20px;margin:16px 0}.station{border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0}.name{font-weight:900;font-size:20px}.url{color:var(--muted);font-size:14px;word-break:break-all;margin:8px 0}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.btn{border:0;border-radius:12px;padding:12px 16px;color:#fff;font-weight:900;cursor:pointer;text-decoration:none;display:inline-block}.reject{background:var(--red)}.link{background:var(--blue)}.empty{color:var(--muted);font-weight:700;padding:12px 0}@media(max-width:520px){body{padding:12px}.btn{width:100%;text-align:center}}</style></head><body><div class="wrap"><div class="top"><h1>Approved Stations</h1><div class="sub">Edit or remove approved stations. Auto-refreshes every 30 seconds.</div></div><div class="card actions"><a class="btn link" href="/admin/pending">Pending</a><a class="btn link" href="/add-station">+ Add Station</a><a class="btn reject" href="/admin/logout">Logout</a></div><div class="card">{% if approved %}{% for s in approved %}<div class="station"><div class="name">{{ s.name }}</div><div class="url">{{ s.url }}</div><div>{{ s.website or s.subtitle }}</div><div class="actions"><a class="btn link" href="/admin/edit/{{ loop.index0 }}">Edit</a><form method="post" action="/admin/delete/{{ loop.index0 }}" onsubmit="return confirm('Delete this station?')"><button class="btn reject">Delete</button></form></div></div>{% endfor %}{% else %}<div class="empty">No approved stations yet.</div>{% endif %}</div></div></body></html>
