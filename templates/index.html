<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Voix Divine</title>
<style>
*{box-sizing:border-box;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:#06143a;color:white}.screen{width:100vw;height:100vh;position:relative;background:radial-gradient(circle at top,#1d4ed8,#07143a 72%)}.page{display:none;position:absolute;inset:0;padding:50px 18px 160px;overflow:auto}.page.active{display:block}.center{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px}.label{font-size:19px;letter-spacing:4px;font-weight:900;opacity:.92}.station{font-size:clamp(34px,7vw,58px);font-weight:900;line-height:1}.website{font-size:clamp(18px,4vw,26px);font-weight:800;opacity:.9}.status{font-size:25px;font-weight:900;color:#ff6b6b}.controls{display:flex;gap:42px;align-items:center;justify-content:center}.btn-clear{border:0;background:transparent;color:white;font-size:72px;font-weight:900;min-width:100px;min-height:100px;line-height:1}.play{width:150px;height:150px;border:0;border-radius:40px;background:linear-gradient(#40c7ff,#216cff);color:white;font-size:74px;font-weight:900;box-shadow:0 16px 35px rgba(0,60,255,.45)}.volume-wrap{background:rgba(255,255,255,.10);border-radius:20px;padding:16px;margin-top:10px}.slider{width:100%;height:42px;accent-color:#38bdf8}.volume-label{text-align:center;font-size:16px;font-weight:900;opacity:.9;margin-top:0}.nav{position:absolute;left:10px;right:10px;bottom:8px;height:132px;border-radius:34px;background:rgba(255,255,255,.22);backdrop-filter:blur(12px);display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:14px;z-index:20}.nav button{border:0;border-radius:26px;background:transparent;color:white;font-size:22px;font-weight:900;min-height:96px}.nav button.active{background:rgba(139,92,246,.78);box-shadow:0 0 0 3px rgba(255,255,255,.20) inset}.wifi{position:absolute;top:10px;left:12px;background:rgba(255,255,255,.16);border-radius:16px;padding:10px 12px;font-weight:900;z-index:25;font-size:14px}.header{font-size:34px;font-weight:900;margin:0 0 16px;padding-top:6px}.card{width:100%;border:0;border-radius:22px;background:rgba(255,255,255,.13);color:white;padding:18px;text-align:left;margin:12px 0;font-size:18px;font-weight:900}.small{font-size:14px;opacity:.72;font-weight:700;margin-top:5px;word-break:break-word}.fav{float:right;color:#ffd166;font-size:24px}.settings-grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:900px;margin:0 auto}.settings-card{background:rgba(255,255,255,.13);border-radius:24px;padding:20px;font-size:18px;font-weight:900}.settings-card.full{grid-column:1/-1}.action{width:100%;border:0;border-radius:20px;background:linear-gradient(90deg,#38bdf8,#2563eb);color:white;padding:20px;font-size:19px;font-weight:900;margin-top:12px}.danger{background:linear-gradient(90deg,#ef4444,#dc2626)}.device-row{display:flex;justify-content:space-between;gap:10px;align-items:center;background:rgba(255,255,255,.09);padding:12px;border-radius:16px;margin-top:10px}.device-row button{border:0;border-radius:14px;background:#2563eb;color:white;padding:10px 14px;font-weight:900}.input{width:100%;border:0;border-radius:16px;padding:15px;margin-top:10px;font-size:16px}.qrbox{text-align:center;background:rgba(255,255,255,.12);padding:24px;border-radius:24px;max-width:520px;margin:0 auto}.qrbox img{width:245px;max-width:82%;background:white;padding:12px;border-radius:18px}.link{color:white;text-decoration:none}.contact{line-height:1.5}.contact a{color:white;font-weight:900}.pill{display:inline-block;background:rgba(34,197,94,.16);border-radius:999px;padding:8px 12px;margin-top:8px}.dot{display:inline-block;width:10px;height:10px;background:#22c55e;border-radius:999px;margin-right:8px}@media(max-width:700px){.page{padding:52px 14px 150px}.settings-grid{grid-template-columns:1fr}.play{width:125px;height:125px;font-size:62px}.btn-clear{font-size:58px;min-width:78px;min-height:78px}.controls{gap:24px}.nav{height:124px}.nav button{font-size:19px;min-height:90px}.station{font-size:38px}.settings-card{font-size:16px}}
.settings-home{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;max-width:900px;margin:0 auto}.settings-tile{border:0;border-radius:28px;background:rgba(255,255,255,.15);color:white;padding:34px 22px;min-height:140px;text-align:left;font-size:30px;font-weight:900}.settings-tile span{display:block;font-size:18px;opacity:.8;margin-top:10px}.settings-panel{display:none;max-width:920px;margin:0 auto}.settings-panel.active{display:block}.back-btn{border:0;border-radius:22px;background:rgba(255,255,255,.18);color:white;padding:18px 24px;font-size:22px;font-weight:900;margin-bottom:14px}.settings-card h2{font-size:34px;margin:0 0 14px}
</style>
</head>
<body>
<div class="screen">
  <div class="wifi" id="wifiBox">WiFi</div>

  <section id="radioPage" class="page active"><div class="center">
    <div class="label">INTERNET STREAM</div>
    <div class="station" id="stationName">La Voix Divine</div>
    <div class="website" id="stationWebsite">radiolavoixdivine.com</div>
    <div class="status" id="networkStatus">● STOPPED</div>
    <div class="controls"><button class="btn-clear" onclick="prevPreset()">⏮</button><button class="play" id="playBtn" onclick="togglePlayback()">▶</button><button class="btn-clear" onclick="nextPreset()">⏭</button></div>
  </div></section>

  <section id="libraryPage" class="page"><div class="header">Library</div><div id="libraryList"></div></section>
  <section id="adsPage" class="page"><div class="header">Ads</div><div class="card">Ad space ready</div></section>

  <section id="settingsPage" class="page"><div class="header">Settings</div>
    <div id="settingsHome" class="settings-home">
      <button class="settings-tile" onclick="openSettingsPanel('volumePanel')">Volume<span>Make the radio louder or quieter</span></button>
      <button class="settings-tile" onclick="openSettingsPanel('wifiPanel')">WiFi<span>Scan and connect to internet</span></button>
      <button class="settings-tile" onclick="openSettingsPanel('bluetoothPanel')">Bluetooth<span>Scan and connect speaker</span></button>
      <button class="settings-tile" onclick="openSettingsPanel('contactPanel')">Contact Us<span>Radio support information</span></button>
    </div>
    <div id="volumePanel" class="settings-panel"><button class="back-btn" onclick="backSettings()">← Back</button><div class="settings-card"><h2>Volume</h2><div class="volume-wrap"><input class="slider" id="volumeSlider" type="range" min="0" max="100" value="80" oninput="setVolume(this.value)"><div class="volume-label">Volume: <span id="volumeValue">80</span>%</div></div></div></div>
    <div id="wifiPanel" class="settings-panel"><button class="back-btn" onclick="backSettings()">← Back</button><div class="settings-card"><h2>WiFi</h2><div id="wifiStatus" class="small">Checking WiFi...</div><button class="action" onclick="scanWifi()">Scan WiFi</button><div id="wifiList"></div></div></div>
    <div id="bluetoothPanel" class="settings-panel"><button class="back-btn" onclick="backSettings()">← Back</button><div class="settings-card"><h2>Bluetooth</h2><div id="btStatus" class="small">Checking Bluetooth...</div><button class="action" onclick="scanBluetooth()">Scan Bluetooth</button><div id="btList"></div></div></div>
    <div id="contactPanel" class="settings-panel"><button class="back-btn" onclick="backSettings()">← Back</button><div class="settings-card contact"><h2>Contact Us</h2><div>La Voix Divine Radio</div><div><a href="https://radiolavoixdivine.com" target="_blank">radiolavoixdivine.com</a></div></div></div>
  </section>

  <section id="addPage" class="page"><div class="header">Add</div><div class="qrbox"><h2>Scan to Add Station</h2><img src="/qr"></div></section>

  <nav class="nav"><button onclick="showPage('radioPage',this)" class="active">Radio</button><button onclick="showPage('libraryPage',this)">Library</button><button onclick="showPage('adsPage',this)">Ads</button><button onclick="showPage('settingsPage',this)">Settings</button><button onclick="showPage('addPage',this)">Add</button></nav>
</div>
<script>
let appState={presets:[],preset_index:0,playing:false,volume:80};
function showPage(id,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');if(id==='libraryPage')renderLibrary();if(id==='settingsPage'){backSettings();loadWifi();loadBluetooth();}}
function openSettingsPanel(id){document.getElementById('settingsHome').style.display='none';document.querySelectorAll('.settings-panel').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='wifiPanel')loadWifi();if(id==='bluetoothPanel')loadBluetooth();}
function backSettings(){let h=document.getElementById('settingsHome');if(h)h.style.display='grid';document.querySelectorAll('.settings-panel').forEach(p=>p.classList.remove('active'));}
function currentPreset(){return appState.presets[appState.preset_index]||appState.presets[0]||null}
function favKey(p){return (p&&((p.url||p.name)||'')).toLowerCase()}function favs(){try{return JSON.parse(localStorage.radioFavs||'[]')}catch(e){return[]}}function isFavorite(p){return favs().includes(favKey(p))}
async function loadState(){try{let r=await fetch('/api/state?ts='+Date.now(),{cache:'no-store'});let d=await r.json();appState.presets=d.presets||[];appState.preset_index=d.preset_index||0;appState.volume=typeof d.volume==='number'?d.volume:80;appState.playing=!!(d.playing&&d.playing.is_playing);let p=currentPreset();document.getElementById('stationName').innerText=(p&&p.name)||d.station_name||'La Voix Divine';document.getElementById('stationWebsite').innerText=(p&&(p.website||p.subtitle))||d.station_website||'';document.getElementById('playBtn').innerText=appState.playing?'⏸':'▶';document.getElementById('networkStatus').innerText=appState.playing?'● PLAYING':'● STOPPED';document.getElementById('networkStatus').style.color=appState.playing?'#67e86f':'#ff6b6b';document.getElementById('volumeSlider').value=appState.volume;document.getElementById('volumeValue').innerText=appState.volume;if(document.getElementById('libraryPage').classList.contains('active'))renderLibrary();}catch(e){console.log(e)}}
async function playPreset(p){if(!p||!p.url)return;await fetch('/api/play-stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:p.url,name:p.name,subtitle:p.subtitle||'Internet Stream',website:p.website||''})});appState.playing=true;loadState();}
async function togglePlayback(){if(appState.playing){await fetch('/api/stop-stream',{method:'POST'});appState.playing=false;loadState();}else{await playPreset(currentPreset())}}
function nextPreset(){if(!appState.presets.length)return;appState.preset_index=(appState.preset_index+1)%appState.presets.length;playPreset(currentPreset())}function prevPreset(){if(!appState.presets.length)return;appState.preset_index=(appState.preset_index-1+appState.presets.length)%appState.presets.length;playPreset(currentPreset())}
async function setVolume(v){document.getElementById('volumeValue').innerText=v;fetch('/api/volume',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({volume:Number(v)})})}
function renderLibrary(){let box=document.getElementById('libraryList');if(!appState.presets.length){box.innerHTML='<div class="card">No stations found</div>';return}box.innerHTML='';appState.presets.forEach((p,i)=>{let b=document.createElement('button');b.className='card';b.innerHTML=`${p.name}<span class="fav">${isFavorite(p)?'★':''}</span><div class="small">${p.website||p.subtitle||'Internet Stream'}</div>`;b.onclick=()=>{appState.preset_index=i;showPage('radioPage',document.querySelector('.nav button'));playPreset(p)};box.appendChild(b)});}
async function loadWifi(){try{let r=await fetch('/api/wifi-status');let d=await r.json();document.getElementById('wifiBox').innerText=d.connected?('WiFi '+d.ssid):'No WiFi';document.getElementById('wifiStatus').innerHTML=d.connected?`<span class="pill"><span class="dot"></span>${d.ssid||'Connected'}</span>`:'Not connected';}catch(e){}}
async function scanWifi(){let box=document.getElementById('wifiList');box.innerHTML='<div class="small">Scanning...</div>';try{let r=await fetch('/api/wifi-scan');let d=await r.json();let nets=d.networks||[];box.innerHTML=nets.length?'':'<div class="small">No WiFi networks found</div>';nets.slice(0,6).forEach(n=>{let div=document.createElement('div');div.className='device-row';div.innerHTML=`<div><b>${n.ssid||'Hidden Network'}</b><div class="small">Signal ${n.signal||''} ${n.security||''}</div></div><button onclick="connectWifi('${(n.ssid||'').replace(/'/g,"\\'")}')">Connect</button>`;box.appendChild(div);});}catch(e){box.innerHTML='<div class="small">WiFi scan failed</div>';}}
async function connectWifi(ssid){let password=prompt('Password for '+ssid+' (leave blank if open network)')||'';await fetch('/api/wifi-connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ssid,password})});setTimeout(loadWifi,2000)}
async function loadBluetooth(){try{let r=await fetch('/api/bluetooth-status');let d=await r.json();let names=(d.connected_devices||[]).map(x=>x.name).join(', ');document.getElementById('btStatus').innerHTML=names?`Connected: ${names}`:(d.powered?'Bluetooth on':'Bluetooth off');}catch(e){}}
async function scanBluetooth(){let box=document.getElementById('btList');box.innerHTML='<div class="small">Scanning...</div>';try{let r=await fetch('/api/bluetooth-scan');let d=await r.json();let devices=d.devices||[];box.innerHTML=devices.length?'':'<div class="small">No Bluetooth devices found</div>';devices.slice(0,6).forEach(dev=>{let div=document.createElement('div');div.className='device-row';div.innerHTML=`<div><b>${dev.name||'Bluetooth Device'}</b><div class="small">${dev.mac||''}</div></div><button onclick="connectBluetooth('${dev.mac}')">Connect</button>`;box.appendChild(div);});}catch(e){box.innerHTML='<div class="small">Bluetooth scan failed</div>';}}
async function connectBluetooth(mac){await fetch('/api/bluetooth-connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mac})});setTimeout(loadBluetooth,2500)}
setInterval(loadState,15000);setInterval(loadWifi,30000);loadState();loadWifi();
</script>
</body>
</html>
