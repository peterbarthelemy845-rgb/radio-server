<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Voix Divine Radio</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="radio-card">
    <div class="eyebrow">Internet Stream</div>
    <h1>La Voix Divine</h1>
    <p class="site">radiolavoixdivine.com</p>

    <div id="status" class="status stopped">● STOPPED</div>

    <audio id="player" preload="none" src="{{ stream_url }}"></audio>

    <div class="controls">
      <button id="playBtn" class="play" onclick="togglePlay()" aria-label="Play radio">▶</button>
      <button class="stop" onclick="stopAudio()" aria-label="Stop radio">■ STOP</button>
    </div>

    <p id="message" class="message">Tap play to start the live stream.</p>
  </main>

  <script>
    const player = document.getElementById("player");
    const playBtn = document.getElementById("playBtn");
    const statusText = document.getElementById("status");
    const message = document.getElementById("message");

    async function togglePlay() {
      if (!player.paused) {
        player.pause();
        setStopped("Paused");
        return;
      }

      try {
        message.textContent = "Connecting...";
        await player.play();
        setPlaying();
      } catch (err) {
        setStopped("Could not start audio. Tap play again or refresh the page.");
        console.error(err);
      }
    }

    function stopAudio() {
      player.pause();
      player.currentTime = 0;
      setStopped("Stopped");
    }

    function setPlaying() {
      statusText.textContent = "● PLAYING";
      statusText.className = "status playing";
      playBtn.textContent = "❚❚";
      message.textContent = "Live now.";
    }

    function setStopped(text = "Stopped") {
      statusText.textContent = "● STOPPED";
      statusText.className = "status stopped";
      playBtn.textContent = "▶";
      message.textContent = text;
    }

    player.addEventListener("playing", setPlaying);
    player.addEventListener("pause", () => setStopped("Paused"));
    player.addEventListener("error", () => setStopped("Stream error. Please try again."));
  </script>
</body>
</html>
