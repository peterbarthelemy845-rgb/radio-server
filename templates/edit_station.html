<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><title>Edit Station</title><style>body{font-family:Arial;background:linear-gradient(180deg,#102a78,#071642);min-height:100vh;margin:0;padding:22px;color:#0f172a}.wrap{max-width:650px;margin:0 auto}.top{color:#fff}.card{background:#fff;border-radius:22px;padding:22px;margin-top:16px}.field{margin:14px 0}label{font-weight:900;display:block;margin-bottom:7px}input{width:100%;min-height:52px;border:2px solid #dbe4f0;border-radius:14px;padding:12px 14px;font-size:17px;box-sizing:border-box}.btn{border:0;border-radius:12px;padding:14px 18px;color:#fff;font-weight:900;background:#2563eb;text-decoration:none;display:inline-block}.red{background:#dc2626}.error{background:#fee2e2;color:#991b1b;padding:12px;border-radius:12px;font-weight:900}</style></head><body><div class="wrap"><div class="top"><h1>Edit Station</h1><div>Update station details.</div></div><div class="card">{% if error %}<div class="error">{{ error }}</div>{% endif %}<form method="post"><div class="field"><label>Name</label><input name="name" value="{{ station.name }}" required></div><div class="field"><label>Stream URL</label><input name="url" value="{{ station.url }}" required></div><div class="field"><label>Website / subtitle</label><input name="subtitle" value="{{ station.website or station.subtitle }}"></div><button class="btn">Save Changes</button><a class="btn red" href="/admin/stations">Cancel</a></form></div></div></body></html>
