<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Edit Station</title><style>:root{--bg:#071642;--card:#fff;--text:#0f172a;--muted:#64748b;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--line:#dbe4f0}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#102a78,#071642);color:var(--text);min-height:100vh;padding:22px}.wrap{max-width:900px;margin:0 auto}.top{color:#fff;margin-bottom:18px}h1{margin:0;font-size:34px}.sub{opacity:.8;margin-top:6px}.card{background:var(--card);border-radius:22px;padding:20px;margin:16px 0;box-shadow:0 18px 45px rgba(0,0,0,.22)}.station{border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0}.name{font-weight:900;font-size:20px}.url{color:var(--muted);font-size:14px;word-break:break-all;margin:8px 0}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.btn{border:0;border-radius:12px;padding:12px 16px;color:#fff;font-weight:900;cursor:pointer;text-decoration:none;display:inline-block}.approve{background:var(--green)}.reject{background:var(--red)}.link{background:var(--blue)}.empty{color:var(--muted);font-weight:700;padding:12px 0}.thumb{width:60px;height:60px;border-radius:14px;object-fit:cover;float:right;margin-left:12px}.field{margin:14px 0}label{font-weight:900;display:block;margin-bottom:7px}input{width:100%;min-height:52px;border:2px solid #dbe4f0;border-radius:14px;padding:12px 14px;font-size:17px}.error{background:#fee2e2;color:#991b1b;padding:12px;border-radius:12px;font-weight:900}@media(max-width:520px){body{padding:12px}h1{font-size:28px}.card{padding:16px;border-radius:18px}.btn{width:100%;text-align:center}.thumb{float:none;margin:0 0 10px 0}}</style></head>
<body><div class="wrap">
<div class="top"><h1>Edit Station</h1><div class="sub">Update station details and replace logo/wallpaper.</div></div>
<div class="card">
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="post" enctype="multipart/form-data">
  <div class="field"><label>Station name</label><input name="name" required value="{{ station.name }}"></div>
  <div class="field"><label>Stream URL</label><input name="url" type="url" required value="{{ station.url }}"></div>
  <div class="field"><label>Website / subtitle</label><input name="subtitle" value="{{ station.subtitle }}"></div>
  <div class="field"><label>Website</label><input name="website" value="{{ station.website }}"></div>
  {% if station.logo_url or station.wallpaper %}<img class="thumb" src="{{ station.logo_url or station.wallpaper }}">{% endif %}
  <div class="field"><label>Replace logo / wallpaper</label><input name="wallpaper" type="file" accept="image/*"></div>
  <button class="btn approve" type="submit">Save Changes</button>
  <a class="btn link" href="/admin/stations">Cancel</a>
</form>
</div></div></body></html>
